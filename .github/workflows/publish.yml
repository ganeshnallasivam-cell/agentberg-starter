name: Release agentberg

# Release = push a tag like v2.0.0 that matches the version in pyproject.toml.
# Two independent outputs from one tag push:
#   - PyPI publish  — the install channel (`pipx install agentberg`). Trusted Publishing (OIDC).
#   - GitHub Release — the release notes, rendered from kit_manifest.json.
# They are separate jobs (github_release does not depend on publish), so notes ship even
# if a PyPI publish is ever skipped/failed, and vice versa.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Guard — tag must match pyproject version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$TAG pyproject=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match pyproject version $PKG — bump pyproject.toml or fix the tag"
            exit 1
          fi

      - name: Guard — release notes must exist for this version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if ! python scripts/release_notes.py --version "$TAG" > /dev/null; then
            echo "::error::no changelog entry for v$TAG in kit_manifest.json — add one before tagging"
            exit 1
          fi
          python scripts/release_notes.py --check

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Smoke-check the built wheel
        run: |
          python -m pip install dist/*.whl
          agentberg --help

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github_release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create the GitHub Release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Render release notes for this tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          python scripts/release_notes.py --version "$TAG" > RELEASE_BODY.md
          cat RELEASE_BODY.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file RELEASE_BODY.md \
            --verify-tag
