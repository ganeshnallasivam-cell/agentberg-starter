name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build the CLI and run a smoke check
        run: |
          python -m pip install --upgrade build
          python -m build
          python -m pip install dist/*.whl
          agentberg --help
      - name: Byte-compile the kit
        run: python -m compileall -q agent.py memory.py alpaca.py risk.py structures.py llm.py config.py agentberg.py scheduler.py knowledge.py character.py identity.py journal.py setup.py llm_providers agentberg_cli

      - name: CHANGELOG.md in sync with kit_manifest.json
        run: python scripts/release_notes.py --check

      - name: Upgrade categories valid (Category 0 stays advisory)
        run: python scripts/validate_categories.py

      - name: pyproject.toml version matches kit_manifest.json
        run: python scripts/validate_version_sync.py
